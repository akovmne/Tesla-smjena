<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tesla Taxi - Raspored Smjena</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

  <div class="header-zone">
    <h1>🚖 Tesla Taxi – Raspored Smjena</h1>
    <div class="header-actions">
      <div id="tomorrowDateDisplay" class="date-badge">Učitavanje datuma...</div>
      <button onclick="clearEntireSchedule()" class="btn-danger">🗑️ Obriši cijeli raspored</button>
    </div>
  </div>

  <div class="card filter-card">
    <div class="horizontal-filters">
      <input id="filterVehicle" placeholder="🔎 Filtriraj po Vozilu (npr. T-01)" oninput="filterTable()">
      <input id="filterDriver" placeholder="🔎 Filtriraj po Vozaču" oninput="filterTable()">
      <input id="filterShift" placeholder="🔎 Filtriraj po Smjeni" oninput="filterTable()">
      <button onclick="resetFilters()" class="btn-secondary">♻️ Reset</button>
    </div>
  </div>

  <div class="card table-card">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th onclick="sortTable(0)" style="cursor: pointer;">Vozilo Broj <span id="sortSort0">↕</span></th>
            <th onclick="sortTable(1)" style="cursor: pointer;">Vozač <span id="sortSort1">↕</span></th>
            <th onclick="sortTable(2)" style="cursor: pointer;">Smjena <span id="sortSort2">↕</span></th>
            <th>Akcija</th>
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="./app.js"></script>
</body>
</html>
